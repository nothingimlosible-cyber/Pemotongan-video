<!DOCTYPE html>
<html lang="id">
<head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Trimmer Pro - Alan</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 480px; width: 100%; background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #ff0000; text-align: center; margin-bottom: 25px; }
        video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 20px; border: 1px solid #444; }
        .control-panel { display: flex; flex-direction: column; gap: 15px; }
        .input-item { display: flex; flex-direction: column; gap: 8px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; }
        button { padding: 15px; background-color: #ff0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #cc0000; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        
        /* Gaya Loading Bar */
        #progressContainer { width: 100%; background-color: #333; border-radius: 10px; margin-top: 20px; display: none; overflow: hidden; }
        #progressBar { width: 0%; height: 10px; background-color: #ff4757; transition: width 0.3s ease; }
        
        #status { margin-top: 10px; text-align: center; font-size: 0.9em; color: #ffa502; min-height: 24px; }
        .result-area { margin-top: 20px; padding: 15px; background: #28a74522; border: 1px dashed #28a745; border-radius: 10px; display: none; text-align: center; }
        .result-area a { color: #28a745; font-weight: bold; text-decoration: none; font-size: 1.1em; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Trimmer Pro 🎬</h2>
    
    <div class="control-panel">
        <div class="input-item">
            <label>Pilih File Video:</label>
            <input type="file" id="videoInput" accept="video/*">
        </div>

        <video id="preview" controls></video>

        <div class="input-item">
            <label>Pilih Model Potongan:</label>
            <select id="aspectRatio">
                <option value="original">Rasio Asli (Apa Adanya)</option>
                <option value="shorts">YouTube Shorts (9:16 Vertikal)</option>
            </select>
        </div>

        <div class="input-item">
            <label>Mulai Detik ke:</label>
            <input type="number" id="startTime" value="0" min="0">
        </div>

        <div class="input-item">
            <label>Durasi (Detik):</label>
            <input type="number" id="duration" value="15" max="60">
        </div>
        
        <button id="trimBtn">Gunting Video Sekarang</button>
    </div>
    
    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>
    
    <div id="status">Siap memproses video.</div>

    <div id="resultArea" class="result-area">
        <p>✨ Video Berhasil Diproses!</p>
        <a id="downloadLink" href="#" target="_blank">⬇️ Klik Sini Untuk Download</a>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    const videoInput = document.getElementById('videoInput');
    const preview = document.getElementById('preview');
    const trimBtn = document.getElementById('trimBtn');
    const status = document.getElementById('status');
    const resultArea = document.getElementById('resultArea');
    const downloadLink = document.getElementById('downloadLink');
    const aspectRatio = document.getElementById('aspectRatio');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    // Menangkap progress dari FFmpeg
    ffmpeg.setProgress(({ ratio }) => {
        const percentage = Math.round(ratio * 100);
        progressBar.style.width = percentage + '%';
        status.innerText = `Sedang memproses... ${percentage}%`;
    });

    videoInput.onchange = function() {
        const file = videoInput.files[0];
        if (file) preview.src = URL.createObjectURL(file);
    };

    trimBtn.onclick = async function() {
        const file = videoInput.files[0];
        if (!file) return alert("Pilih filenya dulu Lan!");

        trimBtn.disabled = true;
        resultArea.style.display = 'none';
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        
        try {
            if (!ffmpeg.isLoaded()) {
                status.innerText = "Memuat mesin pemotong... Sabar ya.";
                await ffmpeg.load();
            }

            const start = document.getElementById('startTime').value;
            const dur = document.getElementById('duration').value;
            const mode = aspectRatio.value;

            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

            let ffmpegArgs = ['-i', 'input.mp4', '-ss', `${start}`, '-t', `${dur}`];

            if (mode === 'shorts') {
                ffmpegArgs.push('-vf', "crop=ih*9/16:ih,scale=720:-1");
            } else {
                ffmpegArgs.push('-vf', "scale='min(1280,iw)':-2");
            }

            ffmpegArgs.push('-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '28', '-c:a', 'copy', 'output.mp4');

            await ffmpeg.run(...ffmpegArgs);

            const data = ffmpeg.FS('readFile', 'output.mp4');
            const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(videoBlob);
            
            downloadLink.href = url;
            downloadLink.download = `alan_video_${Date.now()}.mp4`;
            resultArea.style.display = 'block';
            status.innerText = "Mantap! Selesai.";
            progressContainer.style.display = 'none';
            
        } catch (err) {
            console.error(err);
            status.innerText = "Gagal. Coba video yang durasinya lebih pendek.";
            progressContainer.style.display = 'none';
        } finally {
            trimBtn.disabled = false;
        }
    };
</script>

</body>
</html>
