<!DOCTYPE html>
<html lang="id">
<head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alan Studio Pro - Manual Edit</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        .container { max-width: 450px; width: 100%; padding: 15px; box-sizing: border-box; }
        
        /* Area Kerja Manual */
        .editor-box { 
            width: 100%; aspect-ratio: 9/16; background: #000; position: relative; 
            border-radius: 15px; overflow: hidden; border: 2px solid #ff0000;
            touch-action: none; cursor: move;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        .ui-panel { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-top: 15px; }
        .hint { font-size: 10px; color: #ffa502; text-align: center; margin-bottom: 10px; }
        
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; }
        button { background: #ff0000; color: white; cursor: pointer; }
        #status { font-size: 12px; text-align: center; margin-top: 10px; color: #aaa; }
        
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; display: none; overflow: hidden; }
        #progressFill { width: 0%; height: 100%; background: #ff0000; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #ff0000; text-align: center;">ALAN CLIPPER PRO 🎬</h2>
    <p class="hint">Sentuh & Seret Video buat atur posisi! 👆</p>

    <div class="editor-box" id="editor">
        <canvas id="canvasPreview"></canvas>
    </div>

    <div class="ui-panel">
        <input type="file" id="videoLoad" accept="video/*">
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 10px;">MULAI (DETIK)</label>
                <input type="number" id="startT" value="0">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 10px;">DURASI</label>
                <input type="number" id="durT" value="15">
            </div>
        </div>

        <button id="renderBtn">GUNTING & RENDER HD</button>
        
        <div id="status">Pilih video dulu ya Lan...</div>
        <div class="progress-bar" id="pBar"><div id="progressFill"></div></div>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false });

    const canvas = document.getElementById('canvasPreview');
    const ctx = canvas.getContext('2d');
    const video = document.createElement('video');
    
    // Set resolusi canvas internal (9:16)
    canvas.width = 720;
    canvas.height = 1280;

    let posX = 360, posY = 640, scale = 1;
    let isDragging = false;
    let lastMouseX, lastMouseY;

    // 1. Logika Gambar Manual di Canvas
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (video.readyState >= 2) {
            // Efek Blur Background Otomatis
            ctx.filter = 'blur(20px) brightness(0.5)';
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';

            // Video Utama yang bisa di-drag
            const vW = video.videoWidth * scale;
            const vH = video.videoHeight * scale;
            ctx.drawImage(video, posX - vW/2, posY - vH/2, vW, vH);
        }
        requestAnimationFrame(draw);
    }
    draw();

    // 2. Kontrol Jari / Mouse
    const editor = document.getElementById('editor');
    editor.addEventListener('mousedown', (e) => { isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        posX += (e.clientX - lastMouseX) * 2;
        posY += (e.clientY - lastMouseY) * 2;
        lastMouseX = e.clientX; lastMouseY = e.clientY;
    });

    // Zoom pake Scroll
    editor.addEventListener('wheel', (e) => {
        e.preventDefault();
        scale += e.deltaY * -0.001;
        scale = Math.min(Math.max(.1, scale), 5);
    });

    // 3. Load Video
    document.getElementById('videoLoad').onchange = (e) => {
        video.src = URL.createObjectURL(e.target.files[0]);
        video.loop = true;
        video.play();
    };

    // 4. Render Magic
    document.getElementById('renderBtn').onclick = async () => {
        const file = document.getElementById('videoLoad').files[0];
        if (!file) return;

        // Iklan Alan Studio
        window.open('https://www.profitablecpmratenetwork.com/x9gjq9xm3?key=42622500e3fa317851d92d6c01535d48', '_blank');

        document.getElementById('renderBtn').disabled = true;
        document.getElementById('pBar').style.display = 'block';

        if (!ffmpeg.isLoaded()) await ffmpeg.load();
        ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

        // Konversi koordinat canvas ke koordinat FFmpeg
        const finalW = video.videoWidth * scale;
        const finalH = video.videoHeight * scale;
        const offX = (posX - finalW/2);
        const offY = (posY - finalH/2);

        // Filter FFmpeg buat Blur + Posisi Manual
        const filter = `[0:v]scale=720:1280,boxblur=20:10[bg];[0:v]scale=${finalW}:-1[fg];[bg][fg]overlay=${offX}:${offY},crop=720:1280`;

        await ffmpeg.run(
            '-i', 'input.mp4',
            '-ss', document.getElementById('startT').value,
            '-t', document.getElementById('durT').value,
            '-lavfi', filter,
            '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '25', 'output.mp4'
        );

        const data = ffmpeg.FS('readFile', 'output.mp4');
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        link.download = `alan_pro_manual.mp4`;
        link.click();
        
        document.getElementById('renderBtn').disabled = false;
        document.getElementById('status').innerText = "✅ SIAP SEDOT!";
    };

    ffmpeg.setProgress(({ ratio }) => {
        document.getElementById('progressFill').style.width = (ratio * 100) + '%';
        document.getElementById('status').innerText = `Merender Manual: ${Math.floor(ratio * 100)}%`;
    });
</script>

</body>
</html>
