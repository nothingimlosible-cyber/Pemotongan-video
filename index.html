<body>

            <script type="text/javascript">

                <label>2. ZOOM MANUAL (BESARKAN/KECILKAN)</label>

            </div>

                    <input type="number" id="durT" value="15">
                </div>
            </div>

            <button class="action-btn" id="renderBtn">GUNTING & RENDER HD</button>

            <div class="ai-feature" onclick="window.open('https://t.me/+oWUzJccbisEwMTdl', '_blank')">

            <a href="https://saweria.co/Alansupiandi" class="p-btn" style="grid-column: span 2; background: #333;">☕ TRAKTIR ALAN KOPI (SAWERIA)</a>
        </div>
        
        <p style="font-size: 9px; color: #444; text-align: center; margin-top: 20px;">Copyright © 2026 | Alan Studio Empire</p>
    </div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false });

    const canvas = document.getElementById('canvasPreview');
    const ctx = canvas.getContext('2d');
    const video = document.createElement('video');
    const zoomS = document.getElementById('zoomS');
    
    canvas.width = 720;
    canvas.height = 1280;

    let posX = 360, posY = 640, scale = 1;
    let isDragging = false, lastX, lastY;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (video.readyState >= 2) {
            // Latar Belakang Blur
            ctx.filter = 'blur(25px) brightness(0.4)';
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';

            // Video Utama (Bisa digeser)
            scale = zoomS.value;
            const vW = video.videoWidth * scale;
            const vH = video.videoHeight * scale;
            ctx.drawImage(video, posX - vW/2, posY - vH/2, vW, vH);
        }
        requestAnimationFrame(draw);
    }
    draw();

    // Logika Geser Pakai Jari/Mouse
    const editor = document.getElementById('editor');
    editor.addEventListener('pointerdown', (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('pointerup', () => isDragging = false);
    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        posX += (e.clientX - lastX) * 2;
        posY += (e.clientY - lastY) * 2;
        lastX = e.clientX; lastY = e.clientY;
    });

    document.getElementById('videoLoad').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.muted = true; video.loop = true; video.play();
            document.getElementById('status').innerText = "Video masuk! Geser & Zoom sesukamu Lan.";
        }
    };

    document.getElementById('renderBtn').onclick = async () => {
        const file = document.getElementById('videoLoad').files[0];
        if (!file) return alert("Pilih videonya dulu Lan!");

        window.open('https://www.profitablecpmratenetwork.com/x9gjq9xm3?key=42622500e3fa317851d92d6c01535d48', '_blank');

        const btn = document.getElementById('renderBtn');
        btn.disabled = true;
        document.getElementById('pBar').style.display = 'block';

        if (!ffmpeg.isLoaded()) {
            document.getElementById('status').innerText = "Lagi manasin mesin render...";
            await ffmpeg.load();
        }
        
        ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

        // Kalkulasi posisi final untuk FFmpeg
        const fW = video.videoWidth * scale;
        const offX = posX - fW/2;
        const offY = posY - (video.videoHeight * scale)/2;

        const filter = `[0:v]scale=720:1280,boxblur=20:10[bg];[0:v]scale=${fW}:-1[fg];[bg][fg]overlay=${offX}:${offY},crop=720:1280`;

        try {
            await ffmpeg.run(
                '-i', 'in.mp4',
                '-ss', document.getElementById('startT').value,
                '-t', document.getElementById('durT').value,
                '-lavfi', filter,
                '-c:v', 'libx264',
                '-preset', 'ultrafast',
                '-crf', '25',
                '-c:a', 'aac',    // PERBAIKAN: Masak ulang suara biar muncul
                '-b:a', '128k',   // Bitrate suara standar
                '-map', '0:v:0',  // Ambil video
                '-map', '0:a:0?', // Ambil audio (jika ada)
                'out.mp4'
            );

            const data = ffmpeg.FS('readFile', 'out.mp4');
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            link.download = `alan_studio_pro_${Date.now()}.mp4`;
            link.click();
            
            document.getElementById('status').innerText = "✅ SELESAI! Video siap sedot.";
        } catch (e) {
            document.getElementById('status').innerText = "❌ Gagal Render. Mungkin HP gak kuat.";
        }
        
        btn.disabled = false;
        document.getElementById('pBar').style.display = 'none';
    };

    ffmpeg.setProgress(({ ratio }) => {
        document.getElementById('pFill').style.width = (ratio * 100) + '%';
        document.getElementById('status').innerText = `Merender HD + Suara: ${Math.floor(ratio * 100)}%`;
    });
</script>
