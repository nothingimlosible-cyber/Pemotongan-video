<!DOCTYPE html>
<html lang="id">
<head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Video Clipper HD - Zoom & Pan</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .container { max-width: 450px; width: 100%; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        
        /* Kunci Preview: Biar kelihatan pas di-zoom */
        .video-wrapper { 
            width: 100%; 
            aspect-ratio: 9/16; 
            background: #000; 
            overflow: hidden; 
            position: relative; 
            border-radius: 10px; 
            margin-bottom: 20px;
            display: none; /* Muncul cuma pas mode Shorts */
        }
        #preview { 
            position: absolute; 
            height: 100%; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%); 
            transition: 0.1s; /* Biar smooth pas digeser */
        }

        .input-item { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8em; color: #aaa; }
        input[type="range"] { width: 100%; accent-color: #ff0000; }
        button { width: 100%; padding: 15px; background: #ff0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { font-size: 0.8em; color: #ffa502; text-align: center; margin-top: 10px; }
        .progress-wrapper { width: 100%; height: 10px; background: #333; margin-top: 10px; border-radius: 5px; overflow: hidden; display: none; }
        #progressBar { width: 0%; height: 100%; background: #ff0000; }
        .result-area { margin-top: 20px; text-align: center; display: none; padding: 15px; border: 2px solid #3498db; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#ff0000;">Alan Studio HD 🎬</h2>
    
    <input type="file" id="videoInput" accept="video/*" style="margin-bottom: 20px;">
    
    <div class="video-wrapper" id="wrapper">
        <video id="preview" muted loop></video>
    </div>

    <div class="input-item">
        <label>Model Potongan:</label>
        <select id="aspectRatio" onchange="updateView()">
            <option value="original">Original (Tanpa Edit)</option>
            <option value="shorts">YouTube Shorts (9:16 HD)</option>
        </select>
    </div>

    <div id="controls" style="display:none;">
        <div class="input-item">
            <label>🔍 Zoom:</label>
            <input type="range" id="zoomVal" min="1" max="3" step="0.1" value="1" oninput="updateView()">
        </div>
        <div class="input-item">
            <label>↔️ Geser Kiri/Kanan:</label>
            <input type="range" id="panVal" min="0" max="100" step="1" value="50" oninput="updateView()">
        </div>
    </div>

    <div class="input-item">
        <label>Durasi (Detik):</label>
        <input type="number" id="duration" value="15">
    </div>

    <button id="trimBtn">Gunting & Download HD</button>
    
    <div id="status">Pilih video dulu Lan...</div>
    <div class="progress-wrapper" id="progressWrapper"><div id="progressBar"></div></div>

    <div id="resultArea" class="result-area">
        <p>✅ BERES!</p>
        <a id="downloadLink" href="#" style="color:#3498db; font-weight:bold;">⬇️ DOWNLOAD DISINI</a>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false });

    const videoInput = document.getElementById('videoInput');
    const preview = document.getElementById('preview');
    const wrapper = document.getElementById('wrapper');
    const zoomSlider = document.getElementById('zoomVal');
    const panSlider = document.getElementById('panVal');

    // Fungsi biar preview ikut gerak pas slider digeser
    function updateView() {
        const mode = document.getElementById('aspectRatio').value;
        if (mode === 'shorts') {
            wrapper.style.display = 'block';
            document.getElementById('controls').style.display = 'block';
            
            const zoom = zoomSlider.value;
            const pan = panSlider.value;
            
            // Simulasi visual di layar
            preview.style.transform = `translate(-${pan}%, -50%) scale(${zoom})`;
        } else {
            wrapper.style.display = 'none';
            document.getElementById('controls').style.display = 'none';
        }
    }

    videoInput.onchange = ({ target }) => {
        const file = target.files[0];
        preview.src = URL.createObjectURL(file);
        preview.play();
        updateView();
    };

    document.getElementById('trimBtn').onclick = async () => {
        const file = videoInput.files[0];
        if (!file) return;

        window.open('https://www.profitablecpmratenetwork.com/x9gjq9xm3?key=42622500e3fa317851d92d6c01535d48', '_blank');

        document.getElementById('trimBtn').disabled = true;
        document.getElementById('progressWrapper').style.display = 'block';
        
        if (!ffmpeg.isLoaded()) await ffmpeg.load();

        ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

        const mode = document.getElementById('aspectRatio').value;
        const dur = document.getElementById('duration').value;

        if (mode === 'original') {
            await ffmpeg.run('-i', 'in.mp4', '-t', dur, '-c', 'copy', 'out.mp4');
        } else {
            const z = zoomSlider.value;
            const p = panSlider.value;
            // Rumus sinkronisasi antara preview CSS dan FFmpeg
            let crop = `crop=ih*9/16/${z}:ih/${z}:(iw-ih*9/16/${z})*${p}/100:0`;
            
            await ffmpeg.run('-i', 'in.mp4', '-t', dur, '-vf', `${crop},scale=720:-2`, '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '25', 'out.mp4');
        }

        const data = ffmpeg.FS('readFile', 'out.mp4');
        document.getElementById('downloadLink').href = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        document.getElementById('downloadLink').download = 'alan_studio.mp4';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('trimBtn').disabled = false;
        document.getElementById('status').innerText = "Selesai Lan!";
    };

    ffmpeg.setProgress(({ ratio }) => {
        document.getElementById('progressBar').style.width = (ratio * 100) + '%';
        document.getElementById('status').innerText = `Lagi Render: ${Math.floor(ratio * 100)}%`;
    });
</script>

</body>
</html>
