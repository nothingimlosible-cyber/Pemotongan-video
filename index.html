<!DOCTYPE html>
<html lang="id">
<head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Trimmer Pro - Alan</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { max-width: 480px; width: 100%; background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333; box-sizing: border-box; }
        h2 { color: #ff0000; text-align: center; margin-bottom: 25px; font-size: 1.5rem; }
        video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 20px; border: 1px solid #444; }
        .control-panel { display: flex; flex-direction: column; gap: 15px; }
        .input-item { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85em; color: #aaa; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; font-size: 14px; }
        button { padding: 15px; background-color: #ff0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #cc0000; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        
        .progress-wrapper { width: 100%; background-color: #333; border-radius: 10px; margin-top: 25px; height: 12px; overflow: hidden; display: none; border: 1px solid #444; }
        #progressBar { width: 0%; height: 100%; background-color: #ff0000; transition: width 0.3s ease; }
        
        #status { margin-top: 10px; text-align: center; font-size: 0.85em; color: #ffa502; min-height: 24px; font-weight: 500; }
        
        .result-area { margin-top: 20px; padding: 15px; background: #1e272e; border: 2px solid #3498db; border-radius: 10px; display: none; text-align: center; }
        .result-area a { color: #3498db; font-weight: bold; text-decoration: none; font-size: 1.1em; display: block; margin-top: 10px; }

        .promo-section { margin-top: 30px; padding: 20px; background: #252525; border-radius: 12px; border: 1px solid #444; text-align: center; }
        .promo-section h3 { margin: 10px 0; color: #fff; font-size: 1.1em; }
        .promo-section p { font-size: 0.85em; color: #aaa; margin-bottom: 15px; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-promo { flex: 1; min-width: 130px; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 0.85em; text-align: center; display: block; }
        
        .btn-hype { background: #6c5ce7; color: white; }
        .btn-lynk { background: #00b894; color: white; }
        .btn-coffee { background: #f1c40f; color: #000; margin-top: 10px; width: 100%; }
        .btn-telegram { background: #0088cc; color: white; margin-top: 10px; width: 100%; }
        
        .watermark-text { margin-top: 20px; font-size: 0.8em; color: #666; font-style: italic; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Trimmer Pro 🎬</h2>
    
    <div class="control-panel">
        <div class="input-item">
            <label>Pilih File Video:</label>
            <input type="file" id="videoInput" accept="video/*">
        </div>
        <video id="preview" controls></video>
        <div class="input-item">
            <label>Mulai Detik ke:</label>
            <input type="number" id="startTime" value="0">
        </div>
        <div class="input-item">
            <label>Durasi (Detik):</label>
            <input type="number" id="duration" value="15">
        </div>
        <button id="trimBtn">Gunting Video Sekarang</button>
    </div>
    
    <div class="progress-wrapper" id="progressWrapper">
        <div id="progressBar"></div>
    </div>
    
    <div id="status">Siap memproses video (Mode Cepat).</div>

    <div id="resultArea" class="result-area">
        <p style="color: #3498db; font-weight: bold; margin: 0;">✅ SELESAI!</p>
        <a id="downloadLink" href="#" target="_blank">⬇️ Download Video</a>
    </div>

    <div class="promo-section">
        <h3>Support Alan Studio</h3>
        <div class="btn-group">
            <a href="https://lynk.id/anonymous11" target="_blank" class="btn-promo btn-lynk">🛒 Produk Digital</a>
            <a href="https://hypestoreaffiliate.vercel.app/" target="_blank" class="btn-promo btn-hype">🔥 Hype Store</a>
            <a href="https://saweria.co/Alansupiandi" target="_blank" class="btn-promo btn-coffee">☕ Traktir Alan Kopi</a>
            <a href="https://t.me/+oWUzJccbisEwMTdl" target="_blank" class="btn-promo btn-telegram">📱 Gabung Grup Telegram</a>
        </div>
        <div class="watermark-text">"Kamu boleh pake sepuasnya ya"</div>
        <p style="margin-top: 15px; font-size: 0.7em; color: #555;">Copyright © 2026 | Alan Studio</p>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    const videoInput = document.getElementById('videoInput');
    const preview = document.getElementById('preview');
    const trimBtn = document.getElementById('trimBtn');
    const status = document.getElementById('status');
    const resultArea = document.getElementById('resultArea');
    const downloadLink = document.getElementById('downloadLink');
    const progressWrapper = document.getElementById('progressWrapper');
    const progressBar = document.getElementById('progressBar');

    ffmpeg.setProgress(({ ratio }) => {
        const percentage = Math.floor(ratio * 100);
        if (percentage >= 0 && percentage <= 100) {
            progressBar.style.width = percentage + '%';
            status.innerText = `Memotong... ${percentage}%`;
        }
    });

    videoInput.onchange = function() {
        const file = videoInput.files[0];
        if (file) preview.src = URL.createObjectURL(file);
    };

    trimBtn.onclick = async function() {
        const file = videoInput.files[0];
        if (!file) return alert("Pilih filenya dulu!");

        trimBtn.disabled = true;
        resultArea.style.display = 'none';
        progressWrapper.style.display = 'block';
        progressBar.style.width = '0%';
        
        try {
            if (!ffmpeg.isLoaded()) {
                status.innerText = "Loading mesin (Hanya sekali)...";
                await ffmpeg.load();
            }

            const start = document.getElementById('startTime').value;
            const dur = document.getElementById('duration').value;

            status.innerText = "Mengambil data video...";
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

            // MODE FAST BYPASS: Cuma menggunting, tanpa render ulang (RAM AMAN)
            await ffmpeg.run('-i', 'input.mp4', '-ss', `${start}`, '-t', `${dur}`, '-c', 'copy', 'output.mp4');

            const data = ffmpeg.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            downloadLink.href = url;
            downloadLink.download = `alan_edit_${Date.now()}.mp4`;
            resultArea.style.display = 'block';
            status.innerText = "Selesai! Kilat kan?";
            
            ffmpeg.FS('unlink', 'input.mp4');
            ffmpeg.FS('unlink', 'output.mp4');
            
        } catch (err) {
            console.error(err);
            status.innerText = "Gagal. Gunakan video yang lebih pendek atau restart browser.";
            progressWrapper.style.display = 'none';
        } finally {
            trimBtn.disabled = false;
        }
    };
</script>

</body>
</html>
